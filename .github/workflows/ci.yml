name: CI

on:
  push:
    branches:
      - main
      - "feat/*"
  pull_request:

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "9.0.x"
  IMAGE_NAME: ghcr.io/${{ github.repository }}/erp-api-hub

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ERPApiHub.sln

      - name: Build
        run: dotnet build ERPApiHub.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/ERPApiHub.Tests/ERPApiHub.Tests.csproj --configuration Release --no-build --verbosity normal

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
